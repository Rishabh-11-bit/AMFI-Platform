version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER:     amfi
      POSTGRES_PASSWORD: amfi_password
      POSTGRES_DB:       amfi_v4
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U amfi -d amfi_v4"]
      interval: 5s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    # GPU support (uncomment if you have NVIDIA GPU)
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  amfi:
    build: .
    ports:
      - "8000:8000"
    environment:
      # PostgreSQL (used when running the full stack via docker-compose)
      DATABASE_URL: postgresql+asyncpg://amfi:amfi_password@db:5432/amfi_v4
      OLLAMA_URL:   http://ollama:11434
      OLLAMA_MODEL: llama3.1
      # Set these in .env for production:
      # AUTH_ENABLED: "true"
      # SECRET_KEY:   "<openssl rand -hex 32>"
      # PUBLIC_URL:   "https://your-noc.company.com"
      # CORS_ORIGINS: "https://your-noc.company.com"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./training_data:/app/training_data
      - ./playbooks:/app/playbooks
      - amfi_data:/data   # SQLite fallback (if DATABASE_URL points to SQLite)
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  postgres_data:
  ollama_data:
  amfi_data:
