# AMFI v4 — nginx reverse proxy configuration
# Place this file at /etc/nginx/sites-available/amfi and symlink to sites-enabled/
# Then:  nginx -t && systemctl reload nginx
#
# Adjust server_name and ssl_certificate paths for your environment.
# To generate a self-signed cert for testing:
#   openssl req -x509 -newkey rsa:4096 -keyout /etc/ssl/amfi.key \
#     -out /etc/ssl/amfi.crt -days 365 -nodes -subj '/CN=amfi.local'

# ── Rate-limiting zones ────────────────────────────────────────────────────────
limit_req_zone $binary_remote_addr zone=api_limit:10m  rate=30r/s;
limit_req_zone $binary_remote_addr zone=login_limit:1m rate=5r/m;

# ── HTTP → HTTPS redirect ──────────────────────────────────────────────────────
server {
    listen      80;
    listen      [::]:80;
    server_name amfi.local _;

    # Allow Let's Encrypt challenge (if using certbot)
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS main block ───────────────────────────────────────────────────────────
server {
    listen      443 ssl http2;
    listen      [::]:443 ssl http2;
    server_name amfi.local _;

    # SSL certificates (update paths for your cert)
    ssl_certificate     /etc/ssl/amfi.crt;
    ssl_certificate_key /etc/ssl/amfi.key;

    # Modern TLS settings
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout       1d;
    ssl_session_cache         shared:SSL:10m;
    ssl_stapling              on;
    ssl_stapling_verify       on;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options    "nosniff"                             always;
    add_header X-Frame-Options           "DENY"                                always;
    add_header X-XSS-Protection          "1; mode=block"                       always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"     always;
    add_header Content-Security-Policy   "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' ws: wss:" always;

    # Compression
    gzip            on;
    gzip_types      text/plain text/css application/json application/javascript text/xml application/xml text/javascript;
    gzip_min_length 256;

    # ── WebSocket pass-through ───────────────────────────────────────────────
    location /ws {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ── Auth login — strict rate limit ──────────────────────────────────────
    location /api/auth/login {
        limit_req zone=login_limit burst=3 nodelay;
        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host             $host;
        proxy_set_header   X-Real-IP        $remote_addr;
        proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
    }

    # ── API routes ───────────────────────────────────────────────────────────
    location /api/ {
        limit_req zone=api_limit burst=60 nodelay;

        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host             $host;
        proxy_set_header   X-Real-IP        $remote_addr;
        proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;

        # Long-running agent endpoints can take a while
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;

        # Larger request bodies for file uploads
        client_max_body_size 10m;
    }

    # ── FastAPI docs (optional — remove in production) ───────────────────────
    location ~ ^/(docs|redoc|openapi.json) {
        proxy_pass       http://127.0.0.1:8000;
        proxy_set_header Host $host;
    }

    # ── React frontend (static assets) ──────────────────────────────────────
    root /opt/amfi/frontend/dist;
    index index.html;

    # Cache hashed assets forever
    location /assets/ {
        expires     1y;
        add_header  Cache-Control "public, immutable";
        try_files   $uri =404;
    }

    # SPA fallback — serve index.html for all other paths
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Block access to sensitive files
    location ~ /\. {
        deny all;
    }
}
